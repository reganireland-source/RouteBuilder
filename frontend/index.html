<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>RouteBuilder</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
      html, body, #root { height: 100%; width: 100%; }
      .sort-bar { scrollbar-width: none; -ms-overflow-style: none; }
      .sort-bar::-webkit-scrollbar { display: none; }
      .seg-label {
        background: rgba(0,0,0,0.55) !important;
        border: none !important;
        border-radius: 3px !important;
        box-shadow: none !important;
        color: #fff !important;
        font-size: 10px !important;
        font-weight: 600 !important;
        padding: 1px 4px !important;
        white-space: nowrap !important;
        pointer-events: none !important;
      }
      .seg-label::before { display: none !important; }
      .node-label {
        background: rgba(20,20,40,0.72) !important;
        border: none !important;
        border-radius: 3px !important;
        box-shadow: none !important;
        color: #e0e0ff !important;
        font-size: 9px !important;
        font-weight: 700 !important;
        letter-spacing: 0.04em !important;
        padding: 1px 4px !important;
        white-space: nowrap !important;
        pointer-events: none !important;
      }
      .node-label::before { display: none !important; }
      .outage-tooltip {
        max-width: 320px !important;
        white-space: normal !important;
        word-break: break-word !important;
      }
      /* Prevent iOS Safari auto-zoom on input focus (triggers when font-size < 16px) */
      @media (max-width: 768px) {
        input, select, textarea { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
